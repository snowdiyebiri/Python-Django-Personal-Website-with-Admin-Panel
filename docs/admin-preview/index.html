            <script>
                function toggleTheme() {
                    const body = document.body;
                    const isLight = body.getAttribute('data-theme') === 'light';
                    body.setAttribute('data-theme', isLight ? 'dark' : 'light');
                    localStorage.setItem('theme', isLight ? 'dark' : 'light');
                    document.getElementById('theme-toggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                }
                
                // Initialize Theme
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.body.setAttribute('data-theme', savedTheme);
                document.getElementById('theme-toggle').innerHTML = savedTheme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                
                function toggleSearch() {
                    const form = document.getElementById('search-nav-form');
                    const input = document.getElementById('search-input');
                    form.classList.toggle('active');
                    if (form.classList.contains('active')) {
                        input.focus();
                    }
                }
            </script>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged Image">
</div>

<style>
    .lightbox {
        display: none;
        position: fixed;
        z-index: 2000;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }
    .lightbox img {
        max-width: 90%; max-height: 90%;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
</style>

<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
</script>
