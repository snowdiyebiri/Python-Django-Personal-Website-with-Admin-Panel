                <button type="button" class="nav-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>

                <!-- Theme Selector Dropdown -->
                <div class="theme-dropdown">
                    <button type="button" class="nav-btn" title="Select Site Theme">

            <!-- Search Overlay -->
            <div id="search-overlay" class="search-overlay">
                <button class="close-search" onclick="closeSearch()">&times;</button>
                <div class="search-overlay-content">
                    <form action="/projects/search/" method="get">
                        <input type="text" name="q" placeholder="Type to search projects..." id="search-overlay-input" autocomplete="off">
                        <p class="search-hint">Press Enter to search or ESC to close</p>
                    </form>
                </div>
            </div>

            <script>
                function toggleTheme() {
                    const body = document.body;
                    const isLight = body.getAttribute('data-theme') === 'light';
                    body.setAttribute('data-theme', isLight ? 'dark' : 'light');
                    localStorage.setItem('theme', isLight ? 'dark' : 'light');
                    document.getElementById('theme-toggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                }
                
                // Initialize Theme
                const currentTheme = localStorage.getItem('theme') || 'dark';
                document.body.setAttribute('data-theme', currentTheme);
                document.getElementById('theme-toggle').innerHTML = currentTheme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                
                function openSearch() {
                    document.getElementById('search-overlay').classList.add('active');
                    setTimeout(() => document.getElementById('search-overlay-input').focus(), 100);
                }

                function closeSearch() {
                    document.getElementById('search-overlay').classList.remove('active');
                }

                // Close on ESC
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeSearch();
                });
            </script>
