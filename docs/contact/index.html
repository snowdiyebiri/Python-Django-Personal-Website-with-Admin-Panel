            <script>
                function toggleLanguage() {
                    const lang = localStorage.getItem('lang') === 'tr' ? 'en' : 'tr';
                    localStorage.setItem('lang', lang);
                    applyLanguage(lang);
                }

                function applyLanguage(lang) {
                    document.documentElement.lang = lang;
                    document.getElementById('lang-toggle').innerText = lang === 'tr' ? 'EN' : 'TR';
                    
                    document.querySelectorAll('.lang-en').forEach(el => {
                        el.style.display = (lang === 'en') ? 'inline' : 'none';
                    });
                    document.querySelectorAll('.lang-tr').forEach(el => {
                        el.style.display = (lang === 'tr') ? 'inline' : 'none';
                    });
                }

                function toggleTheme() {
                    const body = document.body;
                    const isLight = body.getAttribute('data-theme') === 'light';
                    body.setAttribute('data-theme', isLight ? 'dark' : 'light');
                    localStorage.setItem('theme', isLight ? 'dark' : 'light');
                    document.getElementById('theme-toggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                }
                
                // Initialize
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.body.setAttribute('data-theme', savedTheme);
                document.getElementById('theme-toggle').innerHTML = savedTheme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
                
                const savedLang = localStorage.getItem('lang') || 'en';
                applyLanguage(savedLang);

                function toggleSearch() {
                    const form = document.getElementById('search-nav-form');
                    const input = document.getElementById('search-input');
                    form.classList.toggle('active');
                    if (form.classList.contains('active')) {
                        input.focus();
                    }
                }
            </script>
