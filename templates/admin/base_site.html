{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}Serhat Çam | Command Center{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 10px; color: #a78bfa; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase;">
        <span style="font-size: 1.5rem;">🚀</span> Serhat Çam
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
<style>
    /* ---------------------------------------------------------
       MODERNIST ADMIN CSS (MATCHES PORTFOLIO)
    --------------------------------------------------------- */
    :root {
        --accent: #a78bfa;
        --bg: #0c0c0e;
        --card: #161619;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --header-bg: #111114;
    }

    /* General Body & Layout */
    body { background: var(--bg) !important; color: var(--text) !important; font-family: 'Segoe UI', system-ui, sans-serif !important; }
    #header { background: var(--header-bg) !important; border-bottom: 2px solid var(--accent) !important; padding: 10px 40px !important; }
    #container { background: var(--bg) !important; }
    #content { background: var(--bg) !important; padding: 30px 40px !important; }
    div.breadcrumbs { background: #1a1a1e !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; color: var(--muted) !important; padding: 10px 40px !important; }
    div.breadcrumbs a { color: var(--accent) !important; }

    /* Module / Card Styling */
    .module { 
        background: var(--card) !important; 
        border: 1px solid rgba(167, 139, 250, 0.1) !important; 
        border-radius: 16px !important; 
        overflow: hidden !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
        margin-bottom: 30px !important;
    }
    .module h2, .module caption { 
        background: rgba(167, 139, 250, 0.1) !important; 
        color: var(--accent) !important; 
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        font-weight: 800 !important;
        padding: 15px 20px !important;
        border-bottom: 1px solid rgba(167, 139, 250, 0.15) !important;
    }

    /* Table Styling */
    table { width: 100% !important; border-collapse: collapse !important; }
    table thead th { background: rgba(0,0,0,0.2) !important; color: var(--muted) !important; text-transform: uppercase !important; font-size: 0.7rem !important; letter-spacing: 1px !important; }
    tr.row1 { background: transparent !important; }
    tr.row2 { background: rgba(255,255,255,0.02) !important; }
    table td, table th { border-bottom: 1px solid rgba(255,255,255,0.03) !important; padding: 14px 20px !important; color: var(--text) !important; }
    table tr:hover { background: rgba(167, 139, 250, 0.05) !important; }
    table a { color: var(--text) !important; font-weight: 600 !important; transition: 0.2s; }
    table a:hover { color: var(--accent) !important; }

    /* Forms & Buttons */
    .button, input[type=submit], input[type=button], .submit-row input, a.button { 
        background: var(--accent) !important; 
        color: #000 !important; 
        font-weight: 800 !important;
        text-transform: uppercase !important;
        border-radius: 10px !important;
        border: none !important;
        padding: 10px 20px !important;
        transition: 0.3s !important;
        cursor: pointer !important;
    }
    .button:hover, input[type=submit]:hover { background: #fff !important; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(167, 139, 250, 0.4) !important; }

    /* Links */
    .addlink, .changelink { color: var(--accent) !important; font-weight: bold !important; font-size: 0.8rem !important; }
    
    /* Navigation Sidebar Fix */
    #content-main { float: none !important; width: 100% !important; margin: 0 !important; }
    .colMS { display: none !important; } /* Hide the dull recent actions */

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
{% endblock %}
