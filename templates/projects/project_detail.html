{% extends "base.html" %}

{% block content %}
<section style="max-width: 900px; margin: 0 auto;">
    <div class="glass-card">
        <h1 style="margin-top: 0; color: #fff; font-size: 3rem; letter-spacing: -1px;">{{ project.title }}</h1>
        <p style="color: var(--accent); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;">{{ project.technology }}</p>
        
        {% if project.image %}
        <div style="margin: 2rem 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
            <img src="{{ project.image.url }}" alt="{{ project.title }}" style="width: 100%; display: block;">
        </div>
        {% endif %}

        <div style="color: var(--text-primary); line-height: 1.8; font-size: 1.1rem; margin-bottom: 2rem;">
            {{ project.description|linebreaks }}
        </div>

        <div style="display: flex; gap: 1.5rem; align-items: center; justify-content: center; margin-top: 1rem;">
            {% if project.link %}
            <a href="{{ project.link }}" class="btn-primary" target="_blank">
                Launch Project
                <i class="fas fa-external-link-alt" style="font-size: 0.8rem;"></i>
            </a>
            {% endif %}
            <a href="{% url 'project_index' %}" class="btn-outline" style="padding: 1rem 2rem;">
                <i class="fas fa-chevron-left" style="font-size: 0.8rem; margin-right: 8px;"></i>
                Back to Projects
            </a>
        </div>
    </div>
</section>
{% endblock %}
