{% extends "base.html" %}

{% block content %}
<section>
    <h2 class="section-title">All <span>Projects</span></h2>
    <div class="grid">
        {% for project in projects %}
        <div class="glass-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            {% if project.image %}
            <div style="height: 200px; overflow: hidden;">
                <img src="{{ project.image.url }}" alt="{{ project.title }}" style="width: 100%; height: 100%; object-fit: cover; transition: 0.5s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
            </div>
            {% endif %}
            <div style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column; gap: 1rem;">
                <h3 style="margin: 0; color: var(--accent);">{{ project.title }}</h3>
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.4;">{{ project.technology }}</p>
                <div style="margin-top: auto;">
                    <a href="{% url 'project_detail' project.pk %}" class="btn" style="padding: 0.6rem 1.2rem; font-size: 0.85rem;">View Details</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p style="text-align: center; grid-column: 1 / -1; color: var(--muted);">No projects added yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
