{% extends "base.html" %}

{% block content %}
<section style="max-width: 900px; margin: 0 auto;">
    <h2 class="section-title">About <span>Me</span></h2>
    
    <div class="glass-card">
        {% if about %}
        <h3 style="margin-top: 0; color: var(--accent); font-size: 1.5rem;">{{ about.subtitle }}</h3>
        <div style="color: var(--text-primary); line-height: 1.8; font-size: 1.1rem; margin-top: 1.5rem;">
            <p><b>Summary:</b> {{ about.summary }}</p>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 2rem 0;">
            <p>{{ about.biography|linebreaks }}</p>
        </div>
        {% else %}
        <p style="color: var(--muted); text-align: center;">Bio content coming soon. Please update in the Admin panel.</p>
        {% endif %}
    </div>

    <div style="margin-top: 3rem; text-align: center;">
        <a href="{% url 'contact' %}" class="btn">Get In Touch</a>
    </div>
</section>
{% endblock %}
