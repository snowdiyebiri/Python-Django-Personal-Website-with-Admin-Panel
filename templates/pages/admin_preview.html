{% extends "base.html" %}
{% load static %}

{% block content %}
<section style="padding: 2rem 0;">
    <h2 class="section-title">Admin <span>Panel Preview</span></h2>
    <p style="color: var(--text-secondary); margin-bottom: 3rem; max-width: 600px;">
        Here is a glimpse of the powerful Command Center that lets you manage your portfolio content, themes, and branding.
    </p>
    
    <div class="grid">
        <div class="glass-card" onclick="openLightbox(this.querySelector('img').src)">
            <h3>Admin Dashboard</h3>
            <img src="{% static 'admin_preview/dashboard.png' %}" alt="Dashboard" style="width: 100%; border-radius: 12px; cursor: pointer;">
        </div>
    </div>
</section>

<!-- Lightbox Modal -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Enlarged Image">
</div>

<style>
    .lightbox {
        display: none;
        position: fixed;
        z-index: 2000;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }
    .lightbox img {
        max-width: 90%; max-height: 90%;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
</style>

<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }
</script>
{% endblock %}
